<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagina Non Trovata | Presenza Digitale</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #050505;
        color: #fff;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 600px;
        padding: 2rem;
      }
      h1 {
        font-size: 6rem;
        margin: 0;
        font-family: 'Playfair Display', serif;
        background-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      h2 {
        font-size: 2rem;
        margin-top: 0;
        margin-bottom: 1.5rem;
        font-weight: 600;
      }
      p {
        color: #a1a1aa;
        font-size: 1.125rem;
        margin-bottom: 2rem;
        line-height: 1.6;
        font-weight: 300;
      }
      a {
        display: inline-block;
        background-color: #fff;
        color: #000;
        text-decoration: none;
        padding: 1rem 2rem;
        border-radius: 9999px;
        font-weight: 700;
        transition: transform 0.2s ease;
      }
      a:hover {
        transform: scale(1.05);
      }
      .bg-effects {
        position: absolute;
        inset: 0;
        z-index: -1;
        overflow: hidden;
      }
      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background-color: rgba(99, 102, 241, 0.1);
        border-radius: 50%;
        filter: blur(100px);
      }
    </style>
  </head>
  <body>
    <div class="bg-effects">
      <div class="glow"></div>
    </div>
    <div class="container">
      <h1>404</h1>
      <h2>Pagina Non Trovata</h2>
      <p>La pagina che stai cercando potrebbe essere stata rimossa, aver cambiato nome o essere temporaneamente non disponibile.</p>
      <a href="/">Torna alla Home</a>
    </div>
  </body>
</html>
