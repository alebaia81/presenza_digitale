    <!-- Google tag (gtag.js) - Delayed Load with GDPR Consent Block -->
    <script>
      window.initGA = function() {
        if (window.gaInitialized) return;
        window.gaInitialized = true;

        var gtmLoaded = false;
        function loadGTM() {
          if (gtmLoaded) return;
          gtmLoaded = true;
          window.removeEventListener('scroll', loadGTM);
          window.removeEventListener('mousemove', loadGTM);
          window.removeEventListener('touchstart', loadGTM);
          
          var script = document.createElement('script');
          script.async = true;
          script.src = "https://www.googletagmanager.com/gtag/js?id=G-ZPJVEH8NC9";
          document.head.appendChild(script);

          window.dataLayer = window.dataLayer || [];
          function gtag(){window.dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-ZPJVEH8NC9', { 'anonymize_ip': true });
        }

        window.addEventListener('scroll', loadGTM, { passive: true });
        window.addEventListener('mousemove', loadGTM, { passive: true });
        window.addEventListener('touchstart', loadGTM, { passive: true });
        setTimeout(loadGTM, 4000);
      };

      // Carica GA all'avvio solo se c'è già il consenso salvato in localStorage
      (function() {
        try {
          var consent = localStorage.getItem('cookie_consent');
          if (consent) {
            var parsed = JSON.parse(consent);
            if (parsed.accepted) {
              window.initGA();
            }
          }
        } catch (e) {}
      })();
    </script>
