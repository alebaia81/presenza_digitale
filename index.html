<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creazione Siti Web Piacenza | Presenza Digitale</title>
    <meta name="description" content="Cerchi un Consulente Web a Piacenza? Presenza Digitale è specializzata nella creazione di siti web professionali e SEO locale per aziende a Piacenza, Rivergaro e provincia. Richiedi un preventivo gratuito." />
    <meta name="keywords" content="creazione siti web piacenza, consulente web piacenza, realizzazione siti internet piacenza, preventivo sito web piacenza, web design piacenza, seo piacenza, sviluppatore web piacenza" />
    <meta name="author" content="Presenza Digitale" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://presenzadigitale.com/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://presenzadigitale.com/" />
    <meta property="og:title" content="Presenza Digitale | Siti Web e SEO a Piacenza" />
    <meta property="og:description" content="Creiamo landing page ad alta conversione per ristoranti e artigiani. Design Dark Luxury, WhatsApp Booking e zero pensieri." />
    <!-- Sostituire l'URL di og:image con l'url dell'immagine finale una volta online -->
    <meta property="og:image" content="https://presenzadigitale.com/og-image.jpg" />
    
    <!-- JSON-LD per Local SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Presenza Digitale",
      "url": "https://presenzadigitale.com",
      "telephone": "+393398156719",
      "email": "presenzadigitalepc@gmail.com",
      "description": "Realizziamo siti web professionali, landing page ad alta conversione e SEO locale per attività locali a Piacenza e provincia.",
      "areaServed": ["Piacenza", "Monticelli d'Ongina", "Castel San Giovanni"],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Piacenza",
        "addressRegion": "PC",
        "addressCountry": "IT"
      }
    }
    </script>
    
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preload Local Fonts -->
    <link rel="preload" href="/assets/fonts/PlayfairDisplay-Variable.ttf" as="font" type="font/ttf" crossorigin />
    
    <!-- Critical CSS & Font-Face -->
    <style>
      @font-face {
        font-family: 'Playfair Display';
        src: url('/assets/fonts/PlayfairDisplay-Variable.ttf') format('truetype-variations');
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Playfair Display';
        src: url('/assets/fonts/PlayfairDisplay-Italic-Variable.ttf') format('truetype-variations');
        font-weight: 400 900;
        font-style: italic;
        font-display: swap;
      }
      :root { --bg-color: #050505; }
      body { background-color: var(--bg-color); color: white; margin: 0; font-family: 'Playfair Display', serif; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>

    <!-- LCP Image Preload -->
    <link rel="preload" as="image" href="/assets/images/hero-bg.webp" fetchpriority="high" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
